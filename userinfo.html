<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turbo-King 欢迎您！</title>
    <script src="js/Bmob-2.2.5.min.js"></script>
    <script>
        Bmob.initialize("17712d06fef648bd", "112233");
        Bmob.debug(true);

        function getLoginInfo() {
            let user = Bmob.User.current();
            var spanTag = document.getElementById("info");
            spanTag.innerHTML = user.username;
        }
    </script>
</head>
<body>
<span id="info"></span>
<button onclick="getLoginInfo()">
    GetLoginUserInfo
</button>
</body>
</html>
