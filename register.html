<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Turbo-King注册页面</title>
    <meta name="keywords" content=""/>
    <meta name="description" content=""/>
    <script src="js/Bmob-2.2.5.min.js"></script>

    <link rel="stylesheet" type="text/css" href="fonts/font-awesome-4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="fonts/iconic/css/material-design-iconic-font.min.css">
    <link rel="stylesheet" type="text/css" href="css/util.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">

    <script>
        Bmob.initialize("17712d06fef648bd", "112233");
        Bmob.debug(true);

        function register() {
            let params = {
                username: document.getElementById("username").value,
                password: document.getElementById("password").value
            }
            Bmob.User.register(params).then(res => {
                location.href = "index.html";
            }).catch(err => {
                alert(err.error);
            });

        }

        function login() {

            location.href = "index.html";
        }
    </script>

</head>

<body>

<div class="limiter">
    <div class="container-login100" style="background-image: url('images/bg-01.jpg');">
        <div class="wrap-login100 p-l-55 p-r-55 p-t-65 p-b-54">

            <span class="login100-form-title p-b-49">注册</span>

            <div class="wrap-input100 validate-input m-b-23" data-validate="请输入用户名">
                <span class="label-input100">用户名</span>
                <input class="input100" type="text" id="username" name="username" placeholder="请输入用户名"
                       autocomplete="off">
                <span class="focus-input100" data-symbol="&#xf206;"></span>
            </div>

            <div class="wrap-input100 validate-input" data-validate="请输入密码">
                <span class="label-input100">密码</span>
                <input class="input100" type="password" id="password" name="pass" placeholder="请输入密码">
                <span class="focus-input100" data-symbol="&#xf190;"></span>
            </div>

            <br>
            <br>
            <br>
            <br>

            <div class="container-login100-form-btn">
                <div class="wrap-login100-form-btn">
                    <div class="login100-form-bgbtn"></div>
                    <button class="login100-form-btn" onclick="register()">注 册</button>
                </div>
            </div>

            <br>
            <br>


            <form action="index.html" style="text-align: center">
                <input type="submit" value="立即登陆" style="font-size: 18px;background-color: white">
            </form>


        </div>
    </div>
</div>

<script src="vendor/jquery/jquery-3.2.1.min.js"></script>
<script src="js/main.js"></script>
</body>

</html>
